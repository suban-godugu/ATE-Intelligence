version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ate-postgres
    environment:
      POSTGRES_DB: ate_intelligence
      POSTGRES_USER: ate_user
      POSTGRES_PASSWORD: ate_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ate_user -d ate_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: ate-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ate.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: ate-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://ate_user:ate_secret@postgres:5432/ate_intelligence
      JWT_ACCESS_SECRET: change-me-access-secret-32chars
      JWT_REFRESH_SECRET: change-me-refresh-secret-32chars
      PORT: 3001
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ate-frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  postgres_data:
